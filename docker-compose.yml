# Production docker-compose configuration

services:
  redis:
    image: redis:latest
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 facturation_backend.asgi:application
    volumes:
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:18
    restart: always
    # Raise the default 100 connection limit so Daphne threads +
    # Celery workers + admin sessions don't exhaust the pool.
    command: postgres -c max_connections=200 -c shared_buffers=256MB
    expose:
      - "5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  celery:
    build: .
    restart: always
    command: celery -A facturation_backend worker --loglevel=info --concurrency=4 -E -P gevent
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ./media:/app/media
      - ./static:/app/static

volumes:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge
