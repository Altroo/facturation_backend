services:
  redis:
    image: redis:latest
    restart: always
    expose:
      - "6379"
    volumes:
      - redis_data:/data
    networks:
      - backend
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build: .
    restart: always
    command: daphne -b 0.0.0.0 -p 8000 facturation_backend.asgi:application
    volumes:
      - static_volume:/app/static
      - media_volume:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    networks:
      - backend
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8000\")'" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  db:
    image: postgres:18
    restart: always
    expose:
      - "5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql
    networks:
      - backend

  celery:
    build: .
    restart: always
    command: celery -A facturation_backend worker --loglevel=info -E -P gevent
    depends_on:
      - db
      - redis
    env_file:
      - .env
    networks:
      - backend
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0

volumes:
  static_volume:
  media_volume:
  postgres_data:
  redis_data:

networks:
  backend:
    driver: bridge


